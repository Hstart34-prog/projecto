<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 2</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; background: linear-gradient(135deg, #ff758c 0%, #764ba2 100%); color: white; text-align: center; }
        .container { padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .touch-button { display: block; margin: 0 auto 30px auto; padding: 12px 25px; font-size: 1rem; color: white; background-color: #ff4757; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .touch-button:hover { transform: scale(1.05); background-color: #ff6b81; }
        .botones-nav { display: flex; gap: 15px; justify-content: center; }
        .boton { display: inline-block; padding: 12px 30px; font-size: 1.1rem; text-decoration: none; border-radius: 25px; font-weight: bold; transition: 0.2s; }
        .atras { color: white; background-color: rgba(255,255,255,0.2); border: 2px solid white; }
        .siguiente { color: #764ba2; background-color: white; }
        .boton:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <button id="touchButton" class="touch-button">¿Una fotito editada???</button>
        <button id="stopStream" disabled style="display: none;">Detener</button>
        
        <h1>Esta es la página 2</h1>
        
        <div class="botones-nav">
            <a href="index.html" class="boton atras">Atrás</a>
            <a href="pagina3.html" class="boton siguiente">Siguiente</a>
        </div>
        
        <div class="video-container">
            <video id="videoElement" autoplay muted style="display: none;"></video>
            <canvas id="canvas" style="display: none;"></canvas>
        </div>
        <div class="notification" id="notification"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
